# Publishes to npm via trusted publishing (OIDC) with provenance.
# Requires the package to have trusted publishing configured on npmjs.com
# for this repository and workflow file.
#
# - Tag push (v*): full gate, then real `npm publish --provenance`.
# - Manual dispatch: same gate, but `npm publish --dry-run` (dress rehearsal).
#
# Two jobs on purpose: the gate job runs large amounts of third-party code
# (vite plugins, playwright, the smoke app's fresh-from-registry install) and
# must never see an OIDC grant — any step in a job with `id-token: write` can
# mint a token and publish via trusted publishing, which binds repo+workflow,
# not step. The gate job packs the exact tarball it validated; the privileged
# job only downloads and publishes those bytes (publishing a tarball file runs
# no package lifecycle scripts, so no build tooling executes beside the token).
name: Publish

on:
    push:
        tags: ['v*']
    workflow_dispatch:

permissions:
    contents: read

jobs:
    gate:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
              with:
                  # Full history so the ancestry gate below can walk from the tag
                  # back to master
                  fetch-depth: 0
            - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
            - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version: 22
                  cache: pnpm
            # With trusted publishing, tag-push rights are publish rights: the
            # gates below only prove the tagged tree is internally consistent,
            # so without this check a tag on a stale or side-branch commit would
            # ship code that never landed on the trunk.
            - name: Verify the tagged commit is on master
              if: github.event_name == 'push'
              run: |
                  git fetch --no-tags origin master
                  if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/master; then
                    echo "tag $GITHUB_REF_NAME points at $GITHUB_SHA, which is not an ancestor of origin/master - refusing to publish" >&2
                    exit 1
                  fi
            - name: Verify tag matches package.json version
              if: github.event_name == 'push'
              run: |
                  TAG="${GITHUB_REF_NAME#v}"
                  PKG="$(node -p "require('./package.json').version")"
                  if [ "$TAG" != "$PKG" ]; then
                    echo "tag v$TAG does not match package.json version $PKG" >&2
                    exit 1
                  fi
            # The CHANGELOG is hand-written and its "Unreleased" section must be
            # retitled to "x.y.z (yyyy-mm-dd)" at release time — this gate turns
            # that maintainer-note convention into a hard failure before publish.
            - name: Verify CHANGELOG was retitled for this release
              if: github.event_name == 'push'
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  if ! grep -Eq "^## ${VERSION//./\\.} \(" CHANGELOG.md; then
                    echo "CHANGELOG.md has no \"## $VERSION (yyyy-mm-dd)\" heading - retitle the Unreleased section before tagging" >&2
                    exit 1
                  fi
                  if grep -q "^## Unreleased" CHANGELOG.md; then
                    echo "CHANGELOG.md still contains an \"## Unreleased\" section - fold it into $VERSION before tagging" >&2
                    exit 1
                  fi
            - run: pnpm install --frozen-lockfile
            - run: pnpm run check
            - run: pnpm run lint
            - run: pnpm run format:check
            - run: pnpm run test:run
            - run: pnpm exec playwright install chromium --with-deps
            - run: pnpm run test:browser
            - run: pnpm run package
            - run: pnpm run lint:package
            - run: pnpm run smoke
            # The exact bytes the publish job ships: pack once here, publish the
            # artifact there — the privileged job never runs a build.
            - name: Pack the gated tarball
              run: pnpm pack
            - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: npm-tarball
                  path: '*.tgz'
                  if-no-files-found: error
                  retention-days: 7

    publish:
        needs: gate
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            # download-artifact reads the artifact through the Actions API
            actions: read
        steps:
            - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version: 22
                  registry-url: 'https://registry.npmjs.org'
            # Trusted publishing needs npm >= 11.5.1; Node 22 bundles npm 10.
            # Pinned to major 11 so a broken npm@latest can't take down releases.
            - run: npm install -g npm@11
            - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: npm-tarball
            - name: Dry-run publish (dress rehearsal)
              if: github.event_name == 'workflow_dispatch'
              # `npm publish --dry-run` rejects versions that are already on the
              # registry, which is the normal state between releases — the gate
              # job already validated the pack, so just report and succeed.
              run: |
                  TARBALL="$(ls ./*.tgz)"
                  NAME="$(tar -xOzf "$TARBALL" package/package.json | node -p 'JSON.parse(require("fs").readFileSync(0, "utf8")).name')"
                  VERSION="$(tar -xOzf "$TARBALL" package/package.json | node -p 'JSON.parse(require("fs").readFileSync(0, "utf8")).version')"
                  if [ -n "$(npm view "$NAME@$VERSION" version 2>/dev/null)" ]; then
                    echo "$NAME@$VERSION is already published - the gate job validated this pack"
                  else
                    npm publish "$TARBALL" --dry-run
                  fi
            - name: Publish with provenance
              if: github.event_name == 'push'
              run: npm publish ./*.tgz --provenance
