# Publishes to npm via trusted publishing (OIDC) with provenance.
# Requires the package to have trusted publishing configured on npmjs.com
# for this repository and workflow file.
#
# - Tag push (v*): full gate, then real `npm publish --provenance`.
# - Manual dispatch: same gate, but `npm publish --dry-run` (dress rehearsal).
name: Publish

on:
    push:
        tags: ['v*']
    workflow_dispatch:

permissions:
    contents: read
    id-token: write

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
            - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
            - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version: 22
                  cache: pnpm
                  registry-url: 'https://registry.npmjs.org'
            - name: Verify tag matches package.json version
              if: github.event_name == 'push'
              run: |
                  TAG="${GITHUB_REF_NAME#v}"
                  PKG="$(node -p "require('./package.json').version")"
                  if [ "$TAG" != "$PKG" ]; then
                    echo "tag v$TAG does not match package.json version $PKG" >&2
                    exit 1
                  fi
            # The CHANGELOG is hand-written and its "Unreleased" section must be
            # retitled to "x.y.z (yyyy-mm-dd)" at release time — this gate turns
            # that maintainer-note convention into a hard failure before publish.
            - name: Verify CHANGELOG was retitled for this release
              if: github.event_name == 'push'
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  if ! grep -Eq "^## ${VERSION//./\\.} \(" CHANGELOG.md; then
                    echo "CHANGELOG.md has no \"## $VERSION (yyyy-mm-dd)\" heading - retitle the Unreleased section before tagging" >&2
                    exit 1
                  fi
                  if grep -q "^## Unreleased" CHANGELOG.md; then
                    echo "CHANGELOG.md still contains an \"## Unreleased\" section - fold it into $VERSION before tagging" >&2
                    exit 1
                  fi
            - run: pnpm install --frozen-lockfile
            - run: pnpm run check
            - run: pnpm run lint
            - run: pnpm run format:check
            - run: pnpm run test:run
            - run: pnpm exec playwright install chromium --with-deps
            - run: pnpm run test:browser
            - run: pnpm run package
            - run: pnpm run lint:package
            - run: pnpm run smoke
            # Trusted publishing needs npm >= 11.5.1; Node 22 bundles npm 10.
            # Pinned to major 11 so a broken npm@latest can't take down releases.
            - run: npm install -g npm@11
            - name: Dry-run publish (dress rehearsal)
              if: github.event_name == 'workflow_dispatch'
              # `npm publish --dry-run` rejects versions that are already on the
              # registry, which is the normal state between releases — fall back
              # to validating the pack only.
              run: |
                  NAME="$(node -p "require('./package.json').name")"
                  VERSION="$(node -p "require('./package.json').version")"
                  if [ -n "$(npm view "$NAME@$VERSION" version 2>/dev/null)" ]; then
                    echo "$NAME@$VERSION is already published - validating pack only"
                    npm pack --dry-run
                  else
                    npm publish --dry-run
                  fi
            - name: Publish with provenance
              if: github.event_name == 'push'
              run: npm publish --provenance
